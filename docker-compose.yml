name: LSTM
services:
  lstm:
    image: lstm:latest
    build:
      context: .
      dockerfile: Dockerfile

    container_name: nlp_lstm

    stdin_open: true
    tty: true

    working_dir: /workdir

    volumes:
      # Change this to your local project path
      - /Users/dhamodharan/My-Python/AI-Tutorials/04_NLP/02_dock_lstm:/workdir

    command: >
      bash -c "
        uv sync &&
        exec bash
      "